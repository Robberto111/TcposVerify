name: .NET Release

on:
  workflow_dispatch:  # ← avvio manuale dalla UI di GitHub

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write  # necessario per aggiornare il file di versione

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore --runtime win-x64

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --verbosity normal --configuration Release

    - name: Publish
      run: dotnet publish --no-build --configuration Release --runtime win-x64 --self-contained true --output ./publish

    - name: Read current version
      id: read_version
      run: |
        if (Test-Path "version.txt") {
          $version = Get-Content "version.txt"
        } else {
          $version = "1.0.0"
        }
        echo "CURRENT_VERSION=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Bump patch version
      id: bump_version
      run: |
        $version = "${{ steps.read_version.outputs.CURRENT_VERSION }}"
        $parts = $version.Split('.')
        $parts[2] = [int]$parts[2] + 1
        $newVersion = $parts -join '.'
        echo $newVersion > version.txt
        echo "NEW_VERSION=$newVersion" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Zip publish output
      run: Compress-Archive -Path ./publish/* -DestinationPath ./release-${{ steps.bump_version.outputs.NEW_VERSION }}.zip
      shell: pwsh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ steps.bump_version.outputs.NEW_VERSION }}
        path: ./release-${{ steps.bump_version.outputs.NEW_VERSION }}.zip
        retention-days: 90

    - name: Commit updated version
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add version.txt
        git commit -m "chore: bump version to ${{ steps.bump_version.outputs.NEW_VERSION }}"
        git push